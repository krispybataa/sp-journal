name: Notify Submission Repository

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger submission repo update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PARENT_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/krispybataa/rodriguez-sp-submission/dispatches \
            -d '{"event_type": "submodule-updated"}'